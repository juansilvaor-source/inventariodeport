<!DOCTYPE html> 
<html>
<head>
<title>Registro</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

<div class="top-bar">
  <img src="logo.png" class="logo">
  <span class="logo-text">BasketSport</span>
</div>

<div class="login-container">

  <div class="login-box">

    <input type="text" placeholder="Nombre" id="nombre">
    <input type="email" placeholder="Correo" id="correo">
    <input type="password" placeholder="Contraseña" id="password">
    
    <button onclick="crearCuenta()">Crear cuenta</button>

    <p style="margin-top:10px; cursor:pointer;" onclick="volverLogin()">
      Volver al login
    </p>

  </div>

</div>

<div class="footer">
  BasketSport ©2026
</div>

<script>
function volverLogin(){
  window.location = "index.html";
}

async function crearCuenta(){
  let nombre = document.getElementById("nombre").value;
  let correo = document.getElementById("correo").value;
  let password = document.getElementById("password").value;

  let res = await fetch("http://localhost:3000/registro", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({nombre, correo, password})
  });

  let data = await res.json();

  alert(data.mensaje);

  if(data.mensaje === "Usuario creado"){
    window.location = "index.html";
  }
}
</script>

</body>
</html>
